operations:
  GetPosts:
    httpMethod: "GET"
    uri: "posts"
    summary: "Gets the available Posts. It's possible to define a limit and a sorting order."
    parameters:
      limit:
        location: "query"
        description: "The number of posts to be retrieved."
        type: "integer"
        required: true
        default: 5
      sort:
        location: "query"
        description: "The sorting order."
        type: "string"
        required: true
        default: "desc"
    responseModel: "ContentEntitiesList"

  GetPostComments:
    httpMethod: "GET"
    uri: "posts/{postId}/comments"
    summary: "Gets a list of all the comments related to the given Post."
    parameters:
      postId:
        location: "uri"
        description: "The Post ID."
        type: "integer"
        required: true
    responseModel: "ContentEntitiesList"
