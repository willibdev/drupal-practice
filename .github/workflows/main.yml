name: Main Workflow

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main ]

env:
  # shivammathur/setup-php
  PHP_EXTENSIONS: dom, curl, libxml, mbstring, zip, pdo, mysql, pdo_mysql, bcmath, gd, exif, iconv
  PHP_VERSION: 8.4

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP with composer v2
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: ${{ env.PHP_EXTENSIONS }}
          tools: composer:v2
          coverage: none

      # Cache Logic for Composer dependencies.
      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/composer
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Validate composer
        run: composer validate

      - name: Install Dependencies
        run: composer install --no-progress --no-interaction --prefer-dist --optimize-autoloader

      # Run PHPCS (Drupal standards) and PHPStan (Drupal rules).
      # These tools will help ensure code quality and adherence to Drupal coding standards.
      # IF these steps fail, the workflow will stop, preventing any further actions (like deployment) from executing.
      - name: Run PHPCS (Drupal standards)
        run: vendor/bin/phpcs --standard=Drupal web/modules/custom

      - name: Run PHPStan (Drupal rules)
        run: vendor/bin/phpstan analyse -c phpstan.neon web/modules/custom

      # Save preview result (Including vendor) as artifact for the next job.
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: drupal-app-builder
          path: .
          retention-days: 1

  # Deploy and pantheon management.
  deploy:
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          name: drupal-app-builder

      # Deploy to Pantheon
      - name: Authenticate and Push to Pantheon
        uses: pantheon-systems/push-to-pantheon@0.9.2
        with:
          ssh_key: ${{ secrets.SSH_PRIVATE_KEY }}
          machine_token: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
          site: ${{ vars.PANTHEON_SITE_NAME }}
          target_env: dev

      - name: Run Drush commands on Pantheon
        run: |
          SITE_ENV="${{ vars.PANTHEON_SITE_NAME }}.dev"

          echo "Creando backup de seguridad en Pantheon..."
          terminus backup:create $SITE_ENV --element=all --keep=2

          echo "Limpiando caché inicial..."
          terminus drush $SITE_ENV -- cr

          echo "Ejecutando actualizaciones de base de datos (updb)..."
          terminus drush $SITE_ENV -- updb -y

          echo "Importando configuración sincronizada (cim)..."
          terminus drush $SITE_ENV -- cim -y

          echo "Limpieza de caché final..."
          terminus drush $SITE_ENV -- cr

          echo "¡Despliegue y actualización completados con éxito!"



